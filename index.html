<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Germacer - Navi Dashboard V6</title>
    <style>
        :root {
            /* MODO NOITE (Padrão) */
            --bg-color: #000000;
            --panel-bg: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
            --accent-color: #ff0000;
            --success-color: #00ff00;
            --text-main: #ffffff;
            --text-dim: #444;
            --map-filter: invert(90%) hue-rotate(180deg) brightness(0.5) contrast(1.2);
            --btn-bg: rgba(0, 0, 0, 0.8);
        }

        /* MODO DIA */
        .light-mode {
            --bg-color: #f0f0f0;
            --panel-bg: linear-gradient(90deg, rgba(240,240,240,1) 0%, rgba(240,240,240,1) 75%, rgba(240,240,240,0) 100%);
            --text-main: #1a1a1a;
            --text-dim: #888;
            --map-filter: none;
            --btn-bg: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        /* TELA DE START */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* SHIFT LIGHT */
        #shift-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0);
            transition: box-shadow 0.2s;
        }
        .shift-active { animation: shift-pulse 0.4s infinite alternate; }
        @keyframes shift-pulse {
            from { box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.5); background: rgba(255, 0, 0, 0.1); }
            to { box-shadow: inset 0 0 150px rgba(255, 0, 0, 1); background: rgba(255, 0, 0, 0.2); }
        }

        .dashboard-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* TELEMETRIA */
        .telemetry-panel {
            position: absolute; left: 0; top: 0; width: 45%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
            background: var(--panel-bg);
            pointer-events: none;
        }

        .speed-value { font-size: 16rem; font-weight: 900; line-height: 0.8; letter-spacing: -5px; }
        .speed-unit { font-size: 2rem; color: var(--accent-color); letter-spacing: 10px; font-weight: bold; }

        .info-grid {
            display: flex; gap: 40px; margin-top: 50px;
            pointer-events: auto; text-align: center;
        }

        .info-item { display: flex; flex-direction: column; }
        .info-label { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 3px; font-weight: bold; margin-bottom: 5px; }
        .info-data { font-size: 2.5rem; font-weight: 700; color: var(--text-main); }
        .info-data span { font-size: 1rem; color: var(--text-dim); margin-left: 5px; }

        /* MAPA */
        .map-panel { position: absolute; right: 0; top: 0; width: 75%; height: 100%; z-index: 1; }
        #map-frame { 
            width: 100%; height: 100%; border: none; 
            filter: var(--map-filter);
            transition: filter 0.5s;
        }

        /* BOTÕES DE CONTROLE */
        .controls-layer {
            position: absolute; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 15px; z-index: 30;
        }

        .btn-action {
            width: 60px; height: 60px;
            background: var(--btn-bg); color: var(--success-color); 
            border: 2px solid var(--success-color);
            border-radius: 50%; font-size: 1.5rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: bold; /* Letras mais grossas para os botões N e D */
        }

        #gps-status { position: absolute; top: 25px; right: 25px; width: 12px; height: 12px; border-radius: 50%; background: #333; z-index: 20; }
        .gps-online { background: var(--success-color) !important; box-shadow: 0 0 10px var(--success-color); animation: blink 1.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="splash-screen" onclick="startDashboard()">
    <h1 style="color: var(--accent-color); letter-spacing: 10px; font-size: 3rem;">GERMACER</h1>
    <p style="color: #666; font-size: 1.2rem;">TOQUE PARA SINCRONIZAR COCKPIT</p>
</div>

<div id="shift-light"></div>

<div class="dashboard-container">
    <div class="telemetry-panel">
        <div class="speed-box">
            <div class="speed-value" id="current-speed">0</div>
            <div class="speed-unit">KM/H</div>
        </div>
        
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">ALTITUDE</div>
                <div class="info-data"><span id="altitude-val">0</span><span>m</span></div>
            </div>
            <div class="info-item" style="border-left: 1px solid var(--text-dim); padding-left: 40px;">
                <div class="info-label">BÚSSOLA</div>
                <div class="info-data" id="compass-val" style="color: var(--success-color);">--</div>
            </div>
        </div>
    </div>

    <div class="map-panel">
        <div id="gps-status"></div>
        
        <div class="controls-layer">
            <button class="btn-action" id="btn-theme" onclick="toggleTheme()">N</button>
            <button class="btn-action" id="btn-recenter">⌖</button>
        </div>

        <iframe id="map-frame" src="about:blank" allowfullscreen="" loading="lazy"></iframe>
    </div>
</div>

<script>
    const shiftLight = document.getElementById('shift-light');
    const mapFrame = document.getElementById('map-frame');
    const altitudeDisplay = document.getElementById('altitude-val');
    const compassDisplay = document.getElementById('compass-val');
    const btnTheme = document.getElementById('btn-theme');
    
    const LIMIT_SPEED = 60;
    let userLat = -19.59;
    let userLon = -46.94;
    let isDark = true;

    function vibrate(ms = 50) { if (navigator.vibrate) navigator.vibrate(ms); }

    function toggleTheme() {
        isDark = !isDark;
        document.body.classList.toggle('light-mode');
        // Alterna entre N (Noite) e D (Dia)
        btnTheme.innerText = isDark ? "N" : "D";
        vibrate(40);
    }

    function startDashboard() {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) docEl.requestFullscreen();
        document.getElementById('splash-screen').style.display = 'none';
        recenterMap();
        vibrate(100);
    }

    function getCompassDirection(heading) {
        const directions = ['N', 'NE', 'L', 'SE', 'S', 'SO', 'O', 'NO'];
        return directions[Math.round(heading / 45) % 8];
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            document.getElementById('gps-status').className = 'gps-online';
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;

            let speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
            if (speed < 0) speed = 0;
            document.getElementById('current-speed').innerText = speed;

            if (pos.coords.altitude !== null) {
                altitudeDisplay.innerText = Math.round(pos.coords.altitude);
            }

            if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
                compassDisplay.innerText = getCompassDirection(pos.coords.heading);
            }

            if (speed > LIMIT_SPEED) {
                shiftLight.classList.add('shift-active');
            } else {
                shiftLight.classList.remove('shift-active');
            }
        }, null, { enableHighAccuracy: true });
    }

    function recenterMap() {
        const newUrl = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15000!2d${userLon}!3d${userLat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1700000000000!5m2!1spt-BR!2sbr`;
        mapFrame.src = newUrl;
    }

    document.getElementById('btn-recenter').onclick = function() {
        vibrate(60);
        recenterMap();
    };
</script>
</body>
</html>
