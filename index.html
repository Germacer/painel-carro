<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Germacer - Navi Dashboard V6</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
            --accent-color: #ff0000;
            --info-color: #0088ff;
            --warning-color: #ffcc00;
            --success-color: #00ff00;
            --text-main: #ffffff;
            --text-dim: #444;
            --map-filter: invert(90%) hue-rotate(180deg) brightness(0.5) contrast(1.2);
            --btn-bg: rgba(0, 0, 0, 0.8);
        }

        .light-mode {
            --bg-color: #f0f0f0;
            --panel-bg: linear-gradient(90deg, rgba(240,240,240,1) 0%, rgba(240,240,240,1) 75%, rgba(240,240,240,0) 100%);
            --text-main: #1a1a1a;
            --text-dim: #888;
            --map-filter: none;
            --btn-bg: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* --- TELA DE BOAS VINDAS ESTILIZADA --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; cursor: pointer;
            transition: opacity 0.8s ease-out;
        }

        .splash-left {
            width: 40%; height: 100%;
            display: flex; flex-direction: column; align-items: left; justify-content: center;
            margin-left: 50px;
            background: var(--panel-bg);
            animation: fadeInSplash 0.5s ease-out forwards;
            z-index: 50;
        }

        .splash-right {
            width: 70%; height: 100%;
            position: absolute; right: 0; top: 0;
            
            /* --- DEFINA AQUI A IMAGEM EXTERNA DO CARRO --- */
            /* Opção A (URL da Internet): Descomente a linha abaixo e cole a URL */
            /* background-image: url('https://SUA_URL_DA_IMAGEM_AQUI.jpg'); */
            
            /* Opção B (Arquivo Local): Se a imagem estiver na mesma pasta que este HTML */
            /* background-image: url('nome_do_seu_arquivo_de_imagem.jpg'); */
            
            /* Imagem de exemplo padrão caso nenhuma opção acima seja definida */
            background-image: url(Audi.png);
            
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            filter: brightness(0.4) grayscale(0.5);
            animation: fadeInSplash 2.5s ease-out forwards;
        }

        @keyframes fadeInSplash {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ------------------------------------------- */

        #alert-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0);
            transition: all 0.2s;
        }
        .alert-blue { animation: pulse-blue 0.6s infinite alternate; }
        @keyframes pulse-blue {
            from { box-shadow: inset 0 0 40px rgba(0, 136, 255, 0.4); background: rgba(0, 136, 255, 0.05); }
            to { box-shadow: inset 0 0 120px rgba(0, 136, 255, 0.8); background: rgba(0, 136, 255, 0.15); }
        }
        .alert-red { animation: pulse-red 0.4s infinite alternate; }
        @keyframes pulse-red {
            from { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.5); background: rgba(255, 0, 0, 0.1); }
            to { box-shadow: inset 0 0 180px rgba(255, 0, 0, 1); background: rgba(255, 0, 0, 0.25); }
        }

        #idle-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 204, 0, 0.9);
            color: #000; padding: 30px 60px; border-radius: 20px;
            text-align: center; z-index: 150; font-weight: 900;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: none; cursor: pointer;
            backdrop-filter: blur(10px);
            border: 4px solid #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #idle-card.active { display: block; transform: translate(-50%, -50%) scale(1); animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%) rotate(0deg); } 25% { transform: translate(-50%, -50%) rotate(2deg); } 75% { transform: translate(-50%, -50%) rotate(-2deg); } }

        .dashboard-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        .telemetry-panel {
            position: absolute; left: 0; top: 0; width: 45%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; background: var(--panel-bg); pointer-events: none;
        }

        .speed-value { font-size: 16rem; font-weight: 900; line-height: 0.8; letter-spacing: -5px; }
        .speed-unit { font-size: 2rem; color: var(--accent-color); letter-spacing: 10px; font-weight: bold; }

        .info-grid { display: flex; gap: 40px; margin-top: 50px; pointer-events: auto; text-align: center; }
        .info-data { font-size: 2.5rem; font-weight: 700; color: var(--text-main); }
        .info-label { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 3px; font-weight: bold; }

        .map-panel { position: absolute; right: 0; top: 0; width: 75%; height: 100%; z-index: 1; }
        #map-frame { width: 100%; height: 100%; border: none; filter: var(--map-filter); transition: filter 0.5s; }

        .controls-layer { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 110; }
        .btn-action {
            width: 60px; height: 60px; background: var(--btn-bg); color: var(--success-color); 
            border: 2px solid var(--success-color); border-radius: 50%; font-size: 1.5rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .btn-off { color: #555 !important; border-color: #555 !important; }
        #gps-status { position: absolute; top: 25px; right: 25px; width: 12px; height: 12px; border-radius: 50%; background: #333; z-index: 20; }
        .gps-online { background: var(--success-color) !important; box-shadow: 0 0 10px var(--success-color); animation: blink 1.5s infinite; }
    </style>
</head>
<body>

<div id="splash-screen" onclick="startDashboard()">
    <div class="splash-left">
        <h1 style="color: var(--accent-color); letter-spacing: 10px; font-size: 3rem; margin: 0;">GERMACER</h1>
        <p style="color: #888; font-size: 0.9rem; letter-spacing: 5px; margin-top: 5px;">NAVIGATION SYSTEMS</p>
        <p style="color: #888; font-size: 0.8rem; letter-spacing: 2px; margin-top: 5px;">AUDI.A3-8L</p>
        <div style="height: 2px; width: 100px; background: var(--success-color); margin: 30px 0;"></div>
        <p style="color: #fff; font-size: 1.2rem; font-weight: 300;">TOQUE PARA INICIAR</p>
    </div>
    <div class="splash-right"></div>
</div>

<div id="alert-layer"></div>

<div id="idle-card" onclick="dismissIdleAlert()">
    <div style="font-size: 1.2rem; opacity: 0.8;">AVISO</div>
    <div style="font-size: 2.5rem;">VEÍCULO PARADO</div>
    <div style="font-size: 0.9rem; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.2); padding-top: 10px;">TOQUE PARA DISPENSAR</div>
</div>

<div class="dashboard-container">
    <div class="telemetry-panel">
        <div class="speed-box">
            <div id="current-speed" class="speed-value">0</div>
            <div class="speed-unit">KM/H</div>
        </div>
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">ALTITUDE</div>
                <div class="info-data"><span id="altitude-val">0</span><span>m</span></div>
            </div>
            <div class="info-item" style="border-left: 1px solid var(--text-dim); padding-left: 40px;">
                <div class="info-label">BÚSSOLA</div>
                <div class="info-data" id="compass-val" style="color: var(--success-color);">--</div>
            </div>
        </div>
    </div>

    <div class="map-panel">
        <div id="gps-status"></div>
        <div class="controls-layer">
            <button class="btn-action" id="btn-alert" onclick="toggleAlert()">S</button>
            <button class="btn-action" id="btn-theme" onclick="toggleTheme()">N</button>
            <button class="btn-action" id="btn-recenter">⌖</button>
        </div>
        <iframe id="map-frame" src="about:blank"></iframe>
    </div>
</div>

<script>
    const alertLayer = document.getElementById('alert-layer');
    const idleCard = document.getElementById('idle-card');
    const mapFrame = document.getElementById('map-frame');
    const btnTheme = document.getElementById('btn-theme');
    const btnAlert = document.getElementById('btn-alert');
    
    const LIMIT_BLUE = 40;
    const LIMIT_RED = 60;
    
    let isDark = true;
    let alertEnabled = true;
    let speedAlertInterval = null;
    let idleAlertInterval = null;
    let idleTimeout = null;
    let manualDismiss = false;

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playWhistle(freq, duration, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function toggleTheme() {
        isDark = !isDark;
        document.body.classList.toggle('light-mode');
        btnTheme.innerText = isDark ? "N" : "D";
        playWhistle(1000, 0.1, 0.2);
    }

    function toggleAlert() {
        alertEnabled = !alertEnabled;
        playWhistle(alertEnabled ? 1500 : 600, 0.1, 0.3);
        btnAlert.classList.toggle('btn-off', !alertEnabled);
        if (!alertEnabled) stopAllAlerts();
    }

    function dismissIdleAlert() {
        manualDismiss = true;
        idleCard.classList.remove('active');
        if (idleAlertInterval) { clearInterval(idleAlertInterval); idleAlertInterval = null; }
        playWhistle(500, 0.1, 0.1);
    }

    function stopAllAlerts() {
        if (speedAlertInterval) { clearInterval(speedAlertInterval); speedAlertInterval = null; }
        if (idleAlertInterval) { clearInterval(idleAlertInterval); idleAlertInterval = null; }
        if (idleTimeout) { clearTimeout(idleTimeout); idleTimeout = null; }
        idleCard.classList.remove('active');
    }

    function startDashboard() {
        audioCtx.resume();
        playWhistle(600, 0.2, 0.3);
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 800);
        
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        recenterMap();
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            document.getElementById('gps-status').className = 'gps-online';
            const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
            document.getElementById('current-speed').innerText = speed;

            alertLayer.className = ""; 
            if (speed >= LIMIT_RED) alertLayer.classList.add('alert-red');
            else if (speed >= LIMIT_BLUE) alertLayer.classList.add('alert-blue');

            if (!alertEnabled) return;

            if (speed >= LIMIT_RED) {
                if (!speedAlertInterval) speedAlertInterval = setInterval(() => playWhistle(2500, 0.15, 0.6), 400);
            } else {
                if (speedAlertInterval) { clearInterval(speedAlertInterval); speedAlertInterval = null; }
            }

            if (speed === 0) {
                if (!idleTimeout && !idleAlertInterval && !manualDismiss) {
                    idleTimeout = setTimeout(() => {
                        idleCard.classList.add('active');
                        if (!idleAlertInterval) {
                            idleAlertInterval = setInterval(() => playWhistle(900, 0.2, 0.4), 2000);
                        }
                    }, 5000);
                }
            } else {
                if (idleTimeout) { clearTimeout(idleTimeout); idleTimeout = null; }
                if (idleAlertInterval) { clearInterval(idleAlertInterval); idleAlertInterval = null; }
                idleCard.classList.remove('active');
                manualDismiss = false;
            }

        }, null, { enableHighAccuracy: true });
    }

    function recenterMap() {
        mapFrame.src = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15000!2d-46.94!3d-19.59!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1700000000000`;
    }
</script>
</body>
</html>
