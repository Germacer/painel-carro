<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Germacer - Navi Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #ff0000;
            --success-color: #00ff00;
        }

        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }

        /* Shift Light */
        #shift-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; transition: 0.2s;
        }
        .shift-active { animation: shift-pulse 0.4s infinite alternate; }
        @keyframes shift-pulse {
            from { box-shadow: inset 0 0 50px rgba(255,0,0,0.4); }
            to { box-shadow: inset 0 0 150px rgba(255,0,0,1); background: rgba(255,0,0,0.1); }
        }

        .dashboard { display: flex; height: 100vh; position: relative; }

        /* Telemetria */
        .telemetry {
            position: absolute; left: 0; width: 40%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; background: linear-gradient(90deg, #000 70%, transparent 100%);
            pointer-events: none;
        }
        .speed { font-size: 14rem; font-weight: 900; line-height: 0.8; }
        .unit { font-size: 2rem; color: var(--accent-color); letter-spacing: 5px; }

        /* Mapa */
        #map {
            position: absolute; right: 0; width: 75%; height: 100%; z-index: 1;
            /* Efeito de Inclinação 3D */
            transform: perspective(500px) rotateX(20deg);
            transform-origin: bottom;
            filter: invert(100%) hue-rotate(180deg) brightness(0.4) contrast(1.3);
        }

        #gps-status { position: absolute; top: 20px; right: 20px; width: 12px; height: 12px; border-radius: 50%; background: #333; z-index: 2000; }
        .gps-on { background: var(--success-color); box-shadow: 0 0 10px var(--success-color); }
    </style>
</head>
<body>

<div id="splash" onclick="init()">
    <h1 style="color:var(--accent-color); letter-spacing:15px;">GERMACER</h1>
    <p>TOQUE PARA INICIAR MAPA 3D</p>
</div>

<div id="shift-light"></div>
<div id="gps-status"></div>

<div class="dashboard">
    <div class="telemetry">
        <div class="speed" id="speed">0</div>
        <div class="unit">KM/H</div>
        <div id="altitude" style="margin-top:20px; font-size:1.5rem; color:#444">ALT: --m</div>
    </div>
    <div id="map"></div>
</div>

<script>
    let map, marker;
    const speedEl = document.getElementById('speed');
    const shiftLight = document.getElementById('shift-light');

    function init() {
        document.getElementById('splash').style.display = 'none';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

        // Inicializa o Mapa focado em Araxá (ou sua posição)
        map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-19.59, -46.94], 17);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Ícone do Carro (Triângulo)
        const carIcon = L.divIcon({
            className: 'car-icon',
            html: '<div style="width:20px; height:20px; background:var(--success-color); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); shadow: 0 0 10px #0f0;"></div>',
            iconSize: [20, 20]
        });

        marker = L.marker([-19.59, -46.94], {icon: carIcon}).addTo(map);

        startTracking();
    }

    function startTracking() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                document.getElementById('gps-status').className = 'gps-on';
                const { latitude, longitude, speed, heading, altitude } = pos.coords;
                
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                speedEl.innerText = kmh;

                // Shift Light > 60km/h
                if(kmh > 60) shiftLight.classList.add('shift-active');
                else shiftLight.classList.remove('shift-active');

                if(altitude) document.getElementById('altitude').innerText = `ALT: ${Math.round(altitude)}m`;

                // Atualiza posição do mapa e do marcador
                const newPos = [latitude, longitude];
                marker.setLatLng(newPos);
                map.panTo(newPos);

                // Gira o mapa conforme a direção (Heading)
                if (heading !== null) {
                    document.getElementById('map').style.transform = `perspective(500px) rotateX(25deg) rotateZ(${-heading}deg)`;
                }
            }, null, { enableHighAccuracy: true });
        }
    }
</script>
</body>
</html>
