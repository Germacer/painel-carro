<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Germacer - Dynamic Navigation</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #ff0000;
            --success-color: #00ff00;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }

        #shift-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0);
            transition: box-shadow 0.2s;
        }
        .shift-active { animation: shift-pulse 0.4s infinite alternate; }
        @keyframes shift-pulse {
            from { box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.5); background: rgba(255, 0, 0, 0.1); }
            to { box-shadow: inset 0 0 150px rgba(255, 0, 0, 1); background: rgba(255, 0, 0, 0.2); }
        }

        .dashboard-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        .telemetry-panel {
            position: absolute; left: 0; top: 0; width: 40%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
            background: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        .speed-value { font-size: 16rem; font-weight: 900; line-height: 0.8; }
        .speed-unit { font-size: 2rem; color: var(--accent-color); font-weight: bold; letter-spacing: 5px; }

        .info-grid { display: flex; gap: 30px; margin-top: 50px; text-align: center; }
        .info-data { font-size: 2.2rem; font-weight: 700; color: #fff; }
        .info-label { font-size: 0.7rem; color: #444; letter-spacing: 2px; }

        .map-panel { position: absolute; right: 0; top: 0; width: 80%; height: 100%; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; filter: invert(90%) hue-rotate(180deg) brightness(0.4) contrast(1.2); }

        #gps-status { position: absolute; top: 20px; right: 20px; width: 10px; height: 10px; border-radius: 50%; background: #333; z-index: 20; }
        .gps-online { background: var(--success-color) !important; box-shadow: 0 0 10px var(--success-color); }
    </style>
</head>
<body>

<div id="splash-screen" onclick="startDashboard()">
    <h1 style="color: var(--accent-color); letter-spacing: 15px;">GERMACER</h1>
    <p style="color: #444;">TOQUE PARA ATIVAR NAVEGAÇÃO 3D</p>
</div>

<div id="shift-light"></div>

<div class="dashboard-container">
    <div class="telemetry-panel">
        <div class="speed-box">
            <div class="speed-value" id="current-speed">0</div>
            <div style="text-align: center;"><span class="speed-unit">KM/H</span></div>
        </div>
        
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">ALTITUDE</div>
                <div class="info-data"><span id="altitude-val">0</span><small style="font-size: 1rem; color:#222">m</small></div>
            </div>
            <div class="info-item" style="border-left: 1px solid #222; padding-left: 30px;">
                <div class="info-label">RUMO</div>
                <div class="info-data" id="compass-val" style="color: var(--success-color);">--</div>
            </div>
        </div>
    </div>

    <div class="map-panel">
        <div id="gps-status"></div>
        <iframe id="map-frame" src="about:blank"></iframe>
    </div>
</div>

<script>
    const mapFrame = document.getElementById('map-frame');
    const LIMIT_SPEED = 60;
    let lastLat, lastLon, lastHeading;

    function startDashboard() {
        document.documentElement.requestFullscreen?.();
        document.getElementById('splash-screen').style.display = 'none';
        updateMap(userLat || -19.59, userLon || -46.94, 0);
    }

    function updateMap(lat, lon, heading) {
        // Parametros: 45 graus de inclinação (tilt), zoom 18 para detalhe de rua
        // O parâmetro 'heading' rotaciona o mapa na direção que você está indo
        const h = heading || 0;
        const url = `https://www.google.com/maps/embed/v1/view?key=YOUR_API_KEY&center=${lat},${lon}&zoom=18&maptype=roadmap&heading=${h}&pitch=45`;
        
        // Nota: Para uso sem chave de API em modo embed simples:
        const simpleUrl = `http://googleusercontent.com/maps.google.com/7{lat},${lon},18z/data=!3m1!1e3!4m2!1m1!4e2?hl=pt-BR`;
        
        if (mapFrame.src !== simpleUrl) {
            mapFrame.src = simpleUrl;
        }
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            document.getElementById('gps-status').className = 'gps-online';
            const { latitude, longitude, speed, altitude, heading } = pos.coords;

            // Atualiza Velocidade
            const kmh = speed ? Math.round(speed * 3.6) : 0;
            document.getElementById('current-speed').innerText = kmh;

            // Shift Light
            if (kmh > LIMIT_SPEED) shiftLight.classList.add('shift-active');
            else shiftLight.classList.remove('shift-active');

            // Atualiza Altitude e Bússola
            if (altitude) document.getElementById('altitude-val').innerText = Math.round(altitude);
            
            if (heading !== null) {
                const directions = ['N', 'NE', 'L', 'SE', 'S', 'SO', 'O', 'NO'];
                document.getElementById('compass-val').innerText = directions[Math.round(heading / 45) % 8];
            }

            // AUTO-FOLLOW: Atualiza o mapa apenas se houver mudança significativa ou movimento
            if (Math.abs(latitude - lastLat) > 0.0001 || Math.abs(heading - lastHeading) > 5) {
                updateMap(latitude, longitude, heading);
                lastLat = latitude; lastLon = longitude; lastHeading = heading;
            }
        }, null, { enableHighAccuracy: true, maximumAge: 1000 });
    }
</script>
</body>
</html>
